<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BHUWAN -X LIKE-VISIT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0a0e1a;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
        }

        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 20;
            width: 100%;
            max-width: 600px;
            background: rgba(10, 18, 35, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid rgba(59, 130, 246, 0.4);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(59, 130, 246, 0.2);
            padding: 28px 26px 36px;
        }

        .brand {
            text-align: center;
            margin-bottom: 22px;
        }
        .brand h1 {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #3b82f6, #1e40af);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .brand p {
            color: #6c8fc7;
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            margin-top: 6px;
        }

        .input-group {
            margin-bottom: 18px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #9bb8e8;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 14px 18px;
            background: #0c1128;
            border: 1.5px solid #2a3a6e;
            border-radius: 40px;
            color: #eef5ff;
            font-size: 1rem;
            outline: none;
        }
        .input-group input:focus, .input-group select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(95deg, #2563eb, #1e3a8a);
            border: none;
            border-radius: 44px;
            font-weight: bold;
            font-size: 0.95rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        button:active { transform: scale(0.97); }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #3b82f6;
            color: #93c5fd;
        }
        .double-btn {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .double-btn button { margin-top: 0; }

        .result-card {
            background: #0f172f;
            border-radius: 28px;
            padding: 18px;
            margin-top: 22px;
            border-left: 5px solid #3b82f6;
        }
        .stat-single {
            padding: 10px 0;
            border-bottom: 1px solid #1e2a4a;
        }
        .stat-single .label {
            font-weight: 700;
            color: #93c5fd;
            display: block;
            margin-bottom: 6px;
            font-size: 0.8rem;
        }
        .stat-single .value {
            font-weight: 700;
            color: #60a5fa;
            font-size: 1rem;
        }

        .badge {
            background: #1e3a8a40;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            display: inline-block;
            color: #93c5fd;
        }

        .key-list {
            max-height: 240px;
            overflow-y: auto;
            background: #0a0f1c;
            border-radius: 24px;
            padding: 12px;
            margin: 12px 0;
        }
        .key-item {
            background: #0f172a;
            margin: 8px 0;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #bfd9ff;
        }
        .delete-key {
            background: #ef444433;
            border: none;
            width: auto;
            padding: 5px 14px;
            font-size: 0.7rem;
            margin: 0;
            border-radius: 30px;
            color: #fca5a5;
            cursor: pointer;
        }

        .loader-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }
        .loader-cube {
            width: 60px;
            height: 60px;
            position: relative;
            transform-style: preserve-3d;
            animation: rotate3d 1.2s infinite ease-in-out;
        }
        .cube-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            opacity: 0.8;
            border-radius: 12px;
        }
        .face-front { transform: translateZ(30px); }
        .face-back { transform: translateZ(-30px) rotateY(180deg); }
        .face-right { transform: translateX(30px) rotateY(90deg); }
        .face-left { transform: translateX(-30px) rotateY(-90deg); }
        .face-top { transform: translateY(-30px) rotateX(90deg); }
        .face-bottom { transform: translateY(30px) rotateX(-90deg); }
        
        @keyframes rotate3d {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg); }
        }
        .loader-text {
            margin-top: 20px;
            color: #60a5fa;
            font-weight: 600;
            font-size: 0.9rem;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .hidden { display: none; }
        footer {
            font-size: 0.65rem;
            text-align: center;
            margin-top: 24px;
            color: #4a6a9e;
        }
        hr {
            margin: 20px 0;
            border-color: #1e2a4a;
        }
        .info-note {
            background: #1a234450;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-top: 8px;
            color: #7e9ed5;
        }
        .usage-warning {
            color: #fbbf24;
            font-size: 0.7rem;
            margin-top: 8px;
            text-align: center;
        }
    </style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<div class="container" id="appContainer">
    <div id="loginSection">
        <div class="brand">
            <h1><i class="fas fa-bolt"></i> BHUWAN -X <span style="color:#60a5fa;">LIKE·VISIT</span></h1>
            <p><i class="fas fa-shield-alt"></i> SECURE BOOST PLATFORM</p>
        </div>
        <div style="text-align:center; margin-bottom: 25px;"><span class="badge"><i class="fas fa-key"></i> ENTER ACCESS KEY</span></div>
        <div class="input-group">
            <label><i class="fas fa-lock"></i> ACCESS KEY</label>
            <input type="password" id="accessKeyInput" placeholder="Enter your access key">
        </div>
        <button id="loginBtn"><i class="fas fa-unlock-alt"></i> UNLOCK DASHBOARD</button>
        <footer><i class="fas fa-database"></i> SECURE SYSTEM</footer>
    </div>

    <div id="userPanel" class="hidden">
        <div class="brand"><h1><i class="fas fa-fire"></i> BHUWAN -X</h1><p><i class="fas fa-user-circle"></i> USER DASHBOARD</p></div>
        <div style="text-align:center;"><span class="badge" id="userKeyDisplay"></span></div>
        <div id="usageInfo" class="usage-warning"></div>
        
        <div class="input-group">
            <label><i class="fas fa-id-card"></i> FREE FIRE UID</label>
            <input type="number" id="userUid" placeholder="Enter UID" value="5682151559">
        </div>
        <div class="input-group">
            <label><i class="fas fa-globe-asia"></i> SERVER REGION</label>
            <select id="userRegion">
                <option value="bd">Bangladesh (bd)</option>
                <option value="ind">India (ind)</option>
                <option value="nepal">Nepal (nepal)</option>
            </select>
        </div>
        <div class="double-btn">
            <button id="userSendLike"><i class="fas fa-heart"></i> SEND LIKE</button>
            <button id="userSendVisit" class="btn-outline"><i class="fas fa-eye"></i> SEND VISIT</button>
        </div>
        <div id="userResult" class="result-card">
            <div style="text-align:center; color:#93c5fd;"><i class="fas fa-check-circle"></i> Ready to boost</div>
        </div>
        <button id="logoutBtnUser" class="btn-outline"><i class="fas fa-sign-out-alt"></i> LOGOUT</button>
    </div>

    <div id="adminPanel" class="hidden">
        <div class="brand"><h1><i class="fas fa-crown"></i> BHUWAN -X</h1><p><i class="fas fa-tachometer-alt"></i> ADMIN CONTROL</p></div>
        
        <div class="input-group">
            <label><i class="fas fa-key"></i> CHANGE ADMIN KEY</label>
            <input type="text" id="changeAdminKeyInput" placeholder="New admin key">
            <button id="updateAdminKeyBtn"><i class="fas fa-save"></i> UPDATE ADMIN KEY</button>
        </div>

        <hr>

        <div class="input-group">
            <label><i class="fas fa-plus-circle"></i> GENERATE USER KEY</label>
            <input type="text" id="newKeyCustom" placeholder="Custom key (optional)">
            <div class="double-btn" style="margin-top: 8px;">
                <input type="number" id="validityDays" placeholder="Validity (days)" value="30" style="width: 50%;">
                <input type="number" id="useLimit" placeholder="Use limit (max 2)" value="2" style="width: 50%;">
            </div>
            <div class="info-note"><i class="fas fa-info-circle"></i> Format: XXXX-XXXX-XXXX | Each key can be used ONLY 2 times total (1 Like + 1 Visit)</div>
            <button id="generateKeyBtn"><i class="fas fa-magic"></i> GENERATE KEY</button>
        </div>

        <div>
            <label><i class="fas fa-list-ul"></i> ALL USER KEYS</label>
            <div id="keysListContainer" class="key-list">
                <div style="text-align:center; color:#6c8fc7;"><i class="fas fa-spinner fa-pulse"></i> Loading...</div>
            </div>
        </div>
        <button id="logoutBtnAdmin" class="btn-outline"><i class="fas fa-sign-out-alt"></i> LOGOUT</button>
    </div>
</div>

<script>
// JWT Session Management
let authToken = null;
let userType = null;

// Check for existing session on page load
function checkExistingSession() {
    const savedToken = localStorage.getItem('jwt_token');
    const savedType = localStorage.getItem('user_type');
    if(savedToken && savedType) {
        fetch('/api/verify-token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: savedToken })
        })
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                authToken = savedToken;
                userType = data.type;
                if(userType === 'admin') {
                    showAdminPanel();
                    loadAdminKeys();
                } else {
                    fetchUserDataFromToken(savedToken);
                }
            } else {
                localStorage.removeItem('jwt_token');
                localStorage.removeItem('user_type');
            }
        })
        .catch(() => {
            localStorage.removeItem('jwt_token');
            localStorage.removeItem('user_type');
        });
    }
}

function fetchUserDataFromToken(token) {
    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        if(payload.key_data) {
            currentUserKey = payload.user_key;
            currentKeyData = payload.key_data;
            showUserPanel(payload.user_key, payload.key_data);
        }
    } catch(e) {
        console.error('Failed to decode token');
    }
}

function saveSession(token, type) {
    authToken = token;
    userType = type;
    localStorage.setItem('jwt_token', token);
    localStorage.setItem('user_type', type);
}

function clearSession() {
    authToken = null;
    userType = null;
    localStorage.removeItem('jwt_token');
    localStorage.removeItem('user_type');
}

function apiCall(endpoint, method, data = null) {
    const headers = {
        'Content-Type': 'application/json'
    };
    if(authToken) {
        headers['Authorization'] = `Bearer ${authToken}`;
    }
    
    return fetch(endpoint, {
        method: method,
        headers: headers,
        body: data ? JSON.stringify(data) : null
    }).then(res => res.json());
}

// ========== APP STATE ==========
let currentUserKey = null;
let currentKeyData = null;

function showLoading(element, message = "Processing request") {
    element.innerHTML = `<div class="loader-wrapper">
        <div class="loader-cube">
            <div class="cube-face face-front"></div>
            <div class="cube-face face-back"></div>
            <div class="cube-face face-right"></div>
            <div class="cube-face face-left"></div>
            <div class="cube-face face-top"></div>
            <div class="cube-face face-bottom"></div>
        </div>
        <div class="loader-text"><i class="fas fa-circle-notch fa-spin"></i> ${message}...</div>
    </div>`;
}

function updateUsageInfo() {
    const container = document.getElementById("usageInfo");
    if(container && currentKeyData) {
        let likeStatus = currentKeyData.like_used ? "Used" : "Available";
        let visitStatus = currentKeyData.visit_used ? "Used" : "Available";
        let remaining = currentKeyData.use_limit - currentKeyData.used_count;
        container.innerHTML = `<i class="fas fa-chart-simple"></i> Usage: Like [${likeStatus}] | Visit [${visitStatus}] | Remaining: ${remaining}/${currentKeyData.use_limit}`;
    }
}

// ========== LOGIN ==========
document.getElementById("loginBtn").addEventListener("click", async () => {
    const key = document.getElementById("accessKeyInput").value.trim();
    if(!key) {
        alert("Please enter a key");
        return;
    }
    
    try {
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key: key })
        });
        const data = await response.json();
        
        if(data.success) {
            saveSession(data.token, data.type);
            
            if(data.type === 'admin') {
                showAdminPanel();
                loadAdminKeys();
            } else if(data.type === 'user') {
                currentUserKey = key;
                currentKeyData = data.key_data;
                showUserPanel(key, data.key_data);
            }
        } else {
            alert(data.message || "Invalid key!");
        }
    } catch(err) {
        alert("Connection error: " + err.message);
    }
});

// ========== SEND LIKE ==========
document.getElementById("userSendLike").addEventListener("click", async () => {
    if(!currentUserKey) { alert("Session expired"); location.reload(); return; }
    if(currentKeyData.like_used) {
        document.getElementById("userResult").innerHTML = `<div class="stat-single"><div class="label"><i class="fas fa-ban"></i> Cannot Use</div><div class="value">This key has already used the LIKE feature.</div></div>`;
        return;
    }
    
    const uid = document.getElementById("userUid").value.trim();
    const region = document.getElementById("userRegion").value;
    
    if(!uid || !/^\d+$/.test(uid)) {
        document.getElementById("userResult").innerHTML = `<div class="stat-single"><div class="label"><i class="fas fa-exclamation-triangle"></i> Error</div><div class="value">Invalid UID</div></div>`;
        return;
    }
    
    const resultDiv = document.getElementById("userResult");
    showLoading(resultDiv, "Sending like");
    
    try {
        const data = await apiCall('/api/send-like', 'POST', { uid: uid, region: region });
        
        if(data.success) {
            currentKeyData.like_used = true;
            currentKeyData.used_count++;
            updateUsageInfo();
            
            const apiData = data.data;
            let html = `<div class="stat-single">
                            <div class="label"><i class="fas fa-user"></i> Player Nickname</div>
                            <div class="value">${apiData.PlayerNickname || 'N/A'}</div>
                        </div>`;
            if(apiData.LikesGivenByAPI !== undefined) {
                html += `<div class="stat-single"><div class="label"><i class="fas fa-heart"></i> Likes Given By API</div><div class="value">${apiData.LikesGivenByAPI}</div></div>`;
            }
            if(apiData.LikesbeforeCommand !== undefined) {
                html += `<div class="stat-single"><div class="label"><i class="fas fa-chart-line"></i> Before Like</div><div class="value">${apiData.LikesbeforeCommand}</div></div>`;
            }
            if(apiData.LikesafterCommand !== undefined) {
                html += `<div class="stat-single"><div class="label"><i class="fas fa-chart-line"></i> After Like</div><div class="value">${apiData.LikesafterCommand}</div></div>`;
            }
            resultDiv.innerHTML = html;
        } else {
            resultDiv.innerHTML = `<div class="stat-single"><div class="label"><i class="fas fa-exclamation-triangle"></i> Error</div><div class="value">${data.message || 'Request failed'}</div></div>`;
        }
    } catch(err) {
        resultDiv.innerHTML = `<div class="stat-single"><div class="label"><i class="fas fa-exclamation-triangle"></i> API Error</div><div class="value">Service temporarily unavailable.</div></div>`;
    }
});

// ========== SEND VISIT ==========
document.getElementById("userSendVisit").addEventListener("click", async () => {
    if(!currentUserKey) { alert("Session expired"); location.reload(); return; }
    if(currentKeyData.visit_used) {
        document.getElementById("userResult").innerHTML = `<div class="stat-single"><div class="label"><i class="fas fa-ban"></i> Cannot Use</div><div class="value">This key has already used the VISIT feature.</div></div>`;
        return;
    }
    
    const uid = document.getElementById("userUid").value.trim();
    const region = document.getElementById("userRegion").value;
    
    if(!uid) {
        document.getElementById("userResult").innerHTML = `<div class="stat-single"><div class="label"><i class="fas fa-exclamation-triangle"></i> Error</div><div class="value">Invalid UID</div></div>`;
        return;
    }
    
    const resultDiv = document.getElementById("userResult");
    showLoading(resultDiv, "Sending visit");
    
    try {
        const data = await apiCall('/api/send-visit', 'POST', { uid: uid, region: region });
        
        if(data.success) {
            currentKeyData.visit_used = true;
            currentKeyData.used_count++;
            updateUsageInfo();
            
            const apiData = data.data;
            let html = `<div class="stat-single">
                            <div class="label"><i class="fas fa-user"></i> Player Nickname</div>
                            <div class="value">${apiData.nickname || 'N/A'}</div>
                        </div>`;
            if(apiData.success !== undefined) {
                html += `<div class="stat-single"><div class="label"><i class="fas fa-check-circle"></i> Success</div><div class="value">${apiData.success}</div></div>`;
            }
            if(apiData.level !== undefined) {
                html += `<div class="stat-single"><div class="label"><i class="fas fa-level-up-alt"></i> Level</div><div class="value">${apiData.level}</div></div>`;
            }
            if(apiData.likes !== undefined) {
                html += `<div class="stat-single"><div class="label"><i class="fas fa-heart"></i> Total Likes</div><div class="value">${apiData.likes}</div></div>`;
            }
            resultDiv.innerHTML = html;
        } else {
            resultDiv.innerHTML = `<div class="stat-single"><div class="label"><i class="fas fa-exclamation-triangle"></i> Error</div><div class="value">${data.message || 'Request failed'}</div></div>`;
        }
    } catch(err) {
        resultDiv.innerHTML = `<div class="stat-single"><div class="label"><i class="fas fa-exclamation-triangle"></i> API Error</div><div class="value">Service temporarily unavailable.</div></div>`;
    }
});

// ========== ADMIN FUNCTIONS ==========
async function loadAdminKeys() {
    try {
        const data = await apiCall('/api/admin/keys', 'GET');
        if(data.success) {
            renderKeysList(data.keys);
        }
    } catch(err) {
        console.error("Failed to load keys");
    }
}

function renderKeysList(keys) {
    const container = document.getElementById("keysListContainer");
    if(!keys || keys.length === 0) {
        container.innerHTML = `<div style="text-align:center; color:#6c8fc7;"><i class="fas fa-database"></i> No keys generated</div>`;
        return;
    }
    let html = "";
    keys.forEach(k => {
        let expiryDate = k.expiry ? new Date(k.expiry).toLocaleDateString() : "∞";
        let expired = (k.expiry && new Date(k.expiry) < new Date());
        let status = expired ? "EXPIRED" : `${k.used_count}/${k.use_limit}`;
        let likeStatus = k.like_used ? "✓" : "✗";
        let visitStatus = k.visit_used ? "✓" : "✗";
        html += `<div class="key-item">
                    <div>
                        <strong><i class="fas fa-key"></i> ${k.key}</strong><br>
                        <span style="font-size:10px;">📅 ${expiryDate} | 📊 ${status} | ❤️${likeStatus} 👁️${visitStatus}</span>
                    </div>
                    <button class="delete-key" data-key="${k.key}"><i class="fas fa-trash"></i> DEL</button>
                </div>`;
    });
    container.innerHTML = html;
    
    document.querySelectorAll(".delete-key").forEach(btn => {
        btn.addEventListener("click", async () => {
            const keyToDel = btn.getAttribute("data-key");
            await apiCall('/api/admin/delete-key', 'POST', { key: keyToDel });
            loadAdminKeys();
        });
    });
}

document.getElementById("updateAdminKeyBtn").addEventListener("click", async () => {
    const oldKey = document.getElementById("accessKeyInput").value.trim();
    const newKey = document.getElementById("changeAdminKeyInput").value.trim();
    if(!newKey) { alert("Enter new admin key"); return; }
    
    const response = await fetch('/api/admin/update-admin-key', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ old_key: oldKey, new_key: newKey })
    });
    const data = await response.json();
    if(data.success) {
        alert("Admin key updated! Please login again.");
        clearSession();
        location.reload();
    } else {
        alert(data.message);
    }
});

document.getElementById("generateKeyBtn").addEventListener("click", async () => {
    const customKey = document.getElementById("newKeyCustom").value.trim();
    const validityDays = document.getElementById("validityDays").value;
    const useLimit = document.getElementById("useLimit").value;
    
    const data = await apiCall('/api/admin/generate-key', 'POST', { 
        custom_key: customKey, 
        validity_days: validityDays, 
        use_limit: useLimit 
    });
    
    if(data.success) {
        alert(`New key: ${data.key}\nValidity: ${data.validity_days} days\nLimit: ${data.use_limit} uses`);
        document.getElementById("newKeyCustom").value = "";
        loadAdminKeys();
    } else {
        alert(data.message);
    }
});

// ========== UI PANEL FUNCTIONS ==========
function showUserPanel(key, keyData) {
    document.getElementById("loginSection").classList.add("hidden");
    document.getElementById("userPanel").classList.remove("hidden");
    document.getElementById("adminPanel").classList.add("hidden");
    document.getElementById("userKeyDisplay").innerHTML = `<i class="fas fa-key"></i> ACTIVE: ${key.substring(0,15)}...`;
    currentUserKey = key;
    currentKeyData = keyData;
    updateUsageInfo();
    document.getElementById("userResult").innerHTML = `<div style="text-align:center; color:#93c5fd;"><i class="fas fa-check-circle"></i> Ready to boost</div>`;
}

function showAdminPanel() {
    document.getElementById("loginSection").classList.add("hidden");
    document.getElementById("userPanel").classList.add("hidden");
    document.getElementById("adminPanel").classList.remove("hidden");
}

async function logout() {
    if(authToken) {
        await apiCall('/api/logout', 'POST');
    }
    clearSession();
    document.getElementById("loginSection").classList.remove("hidden");
    document.getElementById("userPanel").classList.add("hidden");
    document.getElementById("adminPanel").classList.add("hidden");
    document.getElementById("accessKeyInput").value = "";
    currentUserKey = null;
    currentKeyData = null;
    location.reload();
}

document.getElementById("logoutBtnUser").addEventListener("click", logout);
document.getElementById("logoutBtnAdmin").addEventListener("click", logout);

// ========== 3D BACKGROUND ==========
const canvas = document.getElementById("canvas-bg");
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050b1a);
scene.fog = new THREE.FogExp2(0x050b1a, 0.003);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 2, 14);

const renderer3d = new THREE.WebGLRenderer({ canvas, alpha: false });
renderer3d.setSize(window.innerWidth, window.innerHeight);

const ambientLight = new THREE.AmbientLight(0x1a2a4a);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0x4a7aff, 1);
dirLight.position.set(2, 3, 2);
scene.add(dirLight);

const knotGeo = new THREE.TorusKnotGeometry(1.3, 0.3, 200, 32, 3, 4);
const knotMat = new THREE.MeshStandardMaterial({ color: 0x3b82f6, emissive: 0x1e3a8a, roughness: 0.3, metalness: 0.7 });
const knot = new THREE.Mesh(knotGeo, knotMat);
scene.add(knot);

const particleCount = 2000;
const particlesGeo = new THREE.BufferGeometry();
const positionsArray = new Float32Array(particleCount * 3);
for(let i = 0; i < particleCount; i++) {
    positionsArray[i*3] = (Math.random() - 0.5) * 50;
    positionsArray[i*3+1] = (Math.random() - 0.5) * 30;
    positionsArray[i*3+2] = (Math.random() - 0.5) * 40 - 15;
}
particlesGeo.setAttribute('position', new THREE.BufferAttribute(positionsArray, 3));
const particleMat = new THREE.PointsMaterial({ color: 0x5a9eff, size: 0.07, transparent: true, opacity: 0.5 });
const particles3d = new THREE.Points(particlesGeo, particleMat);
scene.add(particles3d);

const ringGeo = new THREE.TorusGeometry(2.2, 0.06, 80, 400);
const ringMat = new THREE.MeshStandardMaterial({ color: 0x3b82f6, emissive: 0x1e40af });
const ring1 = new THREE.Mesh(ringGeo, ringMat);
scene.add(ring1);

let time3d = 0;
function animate3d() {
    requestAnimationFrame(animate3d);
    time3d += 0.008;
    knot.rotation.x += 0.008;
    knot.rotation.y += 0.012;
    ring1.rotation.x = Math.sin(time3d * 0.5) * 0.2;
    ring1.rotation.y += 0.01;
    particles3d.rotation.y += 0.0005;
    camera.position.x = Math.sin(time3d * 0.1) * 0.3;
    camera.position.y = Math.cos(time3d * 0.12) * 0.2;
    camera.lookAt(0, 0, 0);
    renderer3d.render(scene, camera);
}
animate3d();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer3d.setSize(window.innerWidth, window.innerHeight);
});

// Initialize
checkExistingSession();
</script>
